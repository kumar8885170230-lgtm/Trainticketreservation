name: CI Pipeline to Build the Code with Maven

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate with Maven
        run: mvn validate

      - name: Compile with Maven
        run: mvn compile

      - name: Test with Maven
        run: mvn test

      - name: Package with Maven
        run: mvn package

      - name: verify WAR file
        run: ls -lh terget/

      - name: check the tomcat connection
        run: | 
              curl --fail -u "${{ secrets.TOMCAT_USER}}:${{ secrets.TOMCAT_PASSWORD }}" \
              "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/list"

         #deploy to tomcat
      - name: deploy war to tomcat
         run: |
                curl -v -u ${{ secrets.TOMCAT_USER}}:${{secrets.TOMCAT_PASSWORD }} \
                -T target/TrainBook-1.0.0-SNAPSHOT.war \
                "http://${{secrets.TOMCAT-HOST}}:8080/manager/text/deploy/path=/TrainBook&update=true"
